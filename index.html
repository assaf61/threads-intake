<!DOCTYPE html>
<html lang="he" dir="rtl" class="theme-sky">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>חוטים - לכידה</title>
  <meta name="theme-color" content="#7BAEC4">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="app.css">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js" defer></script>
</head>
<body>
  <header class="strip">
    <span class="title">חוטים</span>
    <span class="chips">
      <span id="chip-queue" class="chip">…</span>
      <span id="chip-auth" class="chip">…</span>
    </span>
  </header>

  <main class="grid">
    <button id="btn-write" class="big">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25zM20.7 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span>כתוב</span>
    </button>
    <button id="btn-record" class="big">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      <span>הקלט</span>
    </button>
    <button id="btn-photo" class="big">
      <svg viewBox="0 0 24 24"><path d="M9.4 4 7.7 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3.7L14.6 4H9.4zM12 9a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg>
      <span>צלם</span>
    </button>
    <button id="btn-paste" class="big">
      <svg viewBox="0 0 24 24"><path d="M19 2h-4.18A2.99 2.99 0 0 0 12 0a2.99 2.99 0 0 0-2.82 2H5a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 18H5V4h2v3h10V4h2v16z"/></svg>
      <span>הדבק</span>
    </button>
  </main>

  <input type="file" id="photo-input" accept="image/*" hidden>

  <div id="backdrop" class="backdrop"></div>

  <section id="sheet" class="sheet" dir="rtl">
    <div id="sheet-preview" class="preview"></div>
    <textarea id="sheet-text" placeholder="מה על הלב?" rows="4"></textarea>
    <div class="sheet-actions">
      <button id="sheet-send" class="primary">שלח לחוטים</button>
      <button id="sheet-cancel" class="ghost">ביטול</button>
    </div>
  </section>

  <div id="rec-overlay" class="rec-overlay">
    <div class="rec-box">
      <div class="rec-dot"></div>
      <div id="rec-timer" class="rec-timer">0:00</div>
      <button id="rec-stop" class="primary">סיים הקלטה</button>
      <button id="rec-cancel" class="ghost">בטל</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
